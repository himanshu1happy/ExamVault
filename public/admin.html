<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Studio | ExamVault Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        const userSession = localStorage.getItem('examvault_user');
        
        if (!userSession) {
            // Agar user logged in hi nahi hai, toh login page par feko
            window.location.replace('login.html');
        } else {
            const user = JSON.parse(userSession);
            // Agar user logged in hai, par admin nahi hai, toh home page par bhej do
            if (user.role !== 'admin') {
                alert("Security Alert: You do not have Admin privileges to view this page.");
                window.location.replace('index.html');
            }
        }
    </script>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                <div class="nav-logo-text">Exam<span>Vault</span> <span style="color: #ff4a4a; font-size: 0.8rem; vertical-align: super;">ADMIN</span></div>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
                <a href="papers.html" class="nav-link"><i class="fa-solid fa-book-open"></i> Papers</a>
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-user"></i> Dashboard</a>
            </div>
            <div class="nav-actions">
                <button class="btn-icon" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <main style="margin-top: 100px; padding: 2rem 1.5rem; max-width: 800px; margin-left: auto; margin-right: auto;">
        
        <div class="dashboard-header stagger" style="background: linear-gradient(135deg, #2d3436, #000000); padding: 2rem; border-radius: 16px; color: white; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
            <div>
                <h1 style="margin: 0; font-size: 2rem;"><i class="fa-solid fa-cloud-arrow-up"></i> Creator Studio</h1>
                <p style="margin: 0.5rem 0 0 0; color: #b2bec3;">Upload new question papers and solutions directly to the vault.</p>
            </div>
        </div>
        <div class="form-container stagger" style="background: var(--bg-surface); padding: 2rem; border-radius: 12px; border: 1px solid rgba(108, 92, 231, 0.2);">
            <form id="upload-paper-form" style="display: flex; flex-direction: column; gap: 1.5rem;" enctype="multipart/form-data">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Paper Title *</label>
                        <input type="text" name="title" placeholder="e.g., JEE Main 2026 Physics" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Exam Type *</label>
                        <select name="examType" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-surface); color: var(--text);">
                            <option value="JEE Main">JEE Main</option>
                            <option value="NEET">NEET UG</option>
                            <option value="GATE">GATE</option>
                            <option value="UPSC">UPSC</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Year *</label>
                        <input type="number" name="year" value="2026" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Subject</label>
                        <input type="text" name="subject" placeholder="e.g., Physics" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Difficulty</label>
                        <select name="difficulty" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-surface); color: var(--text);">
                            <option value="Easy">Easy</option>
                            <option value="Moderate" selected>Moderate</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>
                    <div>
    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Solution Video Link (YouTube)</label>
    <input type="text" name="solutionUrl" placeholder="Paste YouTube link here..." style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--text);">
</div>
                </div>

                <div style="border: 2px dashed var(--primary); padding: 2rem; text-align: center; border-radius: 12px; background: rgba(108, 92, 231, 0.05);">
                    <i class="fa-regular fa-file-pdf" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Select PDF File *</label>
                    <input type="file" name="paperFile" accept=".pdf" required style="width: 100%; color: var(--text);">
                    <p style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">Max file size: 20MB</p>
                </div>

                <div style="border: 2px dashed #00b894; padding: 1.5rem; text-align: center; border-radius: 12px; background: rgba(0, 184, 148, 0.05);">
                    <i class="fa-solid fa-file-circle-check" style="font-size: 2rem; color: #00b894; margin-bottom: 0.5rem;"></i>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Select Solution PDF (Optional)</label>
                    <input type="file" name="solutionFile" accept=".pdf" style="width: 100%; color: var(--text);">
                </div>

                <button type="submit" id="upload-btn" class="btn-primary" style="padding: 1rem; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Upload Paper to Vault
                </button>
            </form>
        </div>
        <div class="inbox-container stagger" style="margin-top: 3rem; background: var(--bg-surface); padding: 2rem; border-radius: 12px; border: 1px solid rgba(108, 92, 231, 0.2);">
            <h2 style="margin-top: 0; display: flex; align-items: center; gap: 0.5rem; color: var(--primary);">
                <i class="fa-solid fa-inbox"></i> Student Messages & Requests
            </h2>
            <div id="admin-messages-grid" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
                <div style="color: var(--text-muted); text-align: center;">Loading messages...</div>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
