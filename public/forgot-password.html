<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ExamVault</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container stagger">
            <div class="auth-logo">
                <a href="index.html">
                    <div class="auth-logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                    <div class="auth-logo-text">ExamVault</div>
                </a>
            </div>
            
            <div class="auth-card glass-card">
                <h2 class="auth-title">Reset Password</h2>
                <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
                
                <form action="/api/auth/forgot-password" method="POST" id="reset-form">
                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label class="form-label" for="email">Email Address</label>
                        <div class="form-input-wrapper">
                            <i class="fa-solid fa-envelope form-icon"></i>
                            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-auth">Send Reset Link <i class="fa-solid fa-paper-plane" style="margin-left: 0.5rem;"></i></button>
                </form>
                <div id="reset-message" class="auth-footer" style="display: none; margin-top: 1rem;"></div>
                
                <div class="auth-footer" style="margin-top: 1.5rem;">
                    Remember your password? <a href="login.html">Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
