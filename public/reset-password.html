<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password | ExamVault</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container stagger">
            <div class="auth-logo">
                <a href="index.html">
                    <div class="auth-logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                    <div class="auth-logo-text">ExamVault</div>
                </a>
            </div>

            <div class="auth-card glass-card">
                <h2 class="auth-title">Create New Password</h2>
                <p class="auth-subtitle">Choose a fresh password for your ExamVault account.</p>

                <form action="/api/auth/reset-password" method="POST" id="new-password-form">
                    <div class="form-group" style="margin-bottom: 1.25rem;">
                        <label class="form-label" for="new-password">New Password</label>
                        <div class="form-input-wrapper">
                            <i class="fa-solid fa-lock form-icon"></i>
                            <input type="password" id="new-password" name="password" class="form-input" placeholder="Minimum 6 characters" minlength="6" required>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label class="form-label" for="confirm-password">Confirm Password</label>
                        <div class="form-input-wrapper">
                            <i class="fa-solid fa-lock form-icon"></i>
                            <input type="password" id="confirm-password" class="form-input" placeholder="Re-enter password" minlength="6" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth">Update Password <i class="fa-solid fa-check" style="margin-left: 0.5rem;"></i></button>
                </form>

                <div id="new-password-message" class="auth-footer" style="display: none; margin-top: 1rem;"></div>
                <div class="auth-footer" style="margin-top: 1.5rem;">
                    Remember it now? <a href="login.html">Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
