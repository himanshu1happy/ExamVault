<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | ExamVault</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container stagger">
            <div class="auth-logo">
                <a href="index.html">
                    <div class="auth-logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                    <div class="auth-logo-text">ExamVault</div>
                </a>
            </div>

            <div class="auth-card glass-card">
                <h2 class="auth-title">Create an Account</h2>
                <p class="auth-subtitle">Join thousands of students cracking their exams.</p>
                
                <form id="signup-form">
                    <div class="form-group">
                        <label class="form-label" for="fullname">Full Name</label>
                        <div class="form-input-wrapper">
                            <i class="fa-solid fa-user form-icon"></i>
                            <input type="text" id="fullname" name="fullname" class="form-input" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <div class="form-input-wrapper">
                            <i class="fa-solid fa-envelope form-icon"></i>
                            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="input-group" style="position: relative; margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem;">Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" name="password" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-surface); padding-right: 2.5rem;">
                            
                            <i class="fa-regular fa-eye toggle-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
                        </div>
                    </div>
                   
                    <button type="submit" class="btn-auth">Create Account</button>
                </form>
                
                <div class="auth-footer" style="margin-top: 1.5rem;">
                    Already have an account? <a href="login.html">Sign in here</a>
                </div>
            </div>
        </div>
    </div>

    <div id="otp-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center;">
        <div class="stagger" style="background: var(--bg-surface); padding: 2.5rem; border-radius: 16px; border: 1px solid rgba(108, 92, 231, 0.3); text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div style="background: rgba(108, 92, 231, 0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem auto; color: var(--primary); font-size: 1.5rem;">
                <i class="fa-solid fa-envelope-open-text"></i>
            </div>
            
            <h2 style="margin-top: 0; color: var(--text);">Verify Email</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem;">
                We've sent a 6-digit code to <br>
                <span id="otp-email-display" style="color: var(--primary); font-weight: bold;"></span>
            </p>
            
            <input type="text" id="otp-input" placeholder="• • • • • •" maxlength="6" style="width: 100%; padding: 1rem; text-align: center; font-size: 2rem; letter-spacing: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: var(--text); margin-bottom: 1.5rem; font-weight: bold;">
            
            <button id="verify-otp-btn" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                Verify & Login
            </button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
